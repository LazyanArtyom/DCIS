<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map</title>
 
  <script src="qrc:/resources/qwebchannel.js"></script>
  <script src="https://api-maps.yandex.ru/2.1/?apikey=471e6c57-6649-4e28-b17c-7ea468c36e57&lang=en_RU" type="text/javascript"></script>
  <style>
    html {
        width: 100%;
        height: 100%;
    }
    body{
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
    }
    #map {
      width: 100%;
      height: 100vh;
      cursor: grab;
      user-select: none;
    }
    #map [class*="events-pane"] {
      cursor: grab !important;
    }
    #map input {
      user-select: text;
    }
    #map.ctrl-select,
    #map.ctrl-select [class*="events-pane"] {
      cursor: crosshair !important;
    }
    #map.dragging,
    #map.dragging [class*="events-pane"] {
      cursor: grabbing !important;
    }
    #selectionLayer {
      position: absolute;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
      cursor: crosshair;
    }
    #selectionLayer.active {
      pointer-events: auto;
    }
    #selectionBox {
      position: absolute;
      display: none;
      border: 2px solid #00b7ff;
      background: rgba(0, 183, 255, 0.2);
      box-sizing: border-box;
    }
    body.capture-mode #selectionLayer,
    body.capture-mode #selectionBox,
    body.capture-mode #map [class*="controls-pane"] {
      display: none !important;
    }
    #map .ymaps-2-1-79-gotoymaps, #map .ymaps-2-1-79-copyrights-pane{
        display: none;
    }
    #coordinates {
      font-size: 16px;
      margin-top: 10px;
    }
    #selectButton {
      margin: 10px 0;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    #selectButton:hover {
      background-color: #45a049;
    }
    .resize-handle {
      width: 10px;
      height: 10px;
      background-color: red;
      position: absolute;
      cursor: nwse-resize;
      border-radius: 50%;
      z-index: 1000;
    }
    #map .ymaps-2-1-79-searchbox-input__input::placeholder{
        color: #ffffffa8;
    }
    #map .ymaps-2-1-79-searchbox-input__input, #map .ymaps-2-1-79-searchbox-input{
        background: #13253b;
        color: #ffffff;
        border-radius: 10px 0 0 10px;
        height: 45px;
    }
    #map .ymaps-2-1-79-searchbox-button{
        background-color: #ed5b25;
        height: 45px;
        color: #fff;
        border-radius: 0 10px 10px 0 ;
    }
    #map .ymaps-2-1-79-searchbox-button-text{
        height: 45px;
        line-height: 45px;
        color: #fff;
    }
  </style>
</head>
<body>
   <div id="map"></div>
   <div id="selectionLayer"><div id="selectionBox"></div></div>
    <script>
        let mapWidget = null;

        new QWebChannel(qt.webChannelTransport, function(channel) {
            mapWidget = channel.objects.mapWidget;
        });

        ymaps.ready(init);

        let map;
        let startCoords = null;
        let lastCoords = null;
        let startPixel = null;
        let lastPixel = null;
        let isDrawing = false;
        let highResolutionCaptureState = null;

        function init() {
            map = new ymaps.Map("map", {
                center: [40.1792, 44.4991],
                zoom: 13,
                type: 'yandex#satellite',
                controls: ['searchControl']
            });

            map.behaviors.enable('drag');

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Control') {
                    enableSelectionMode();
                }
            });

            document.addEventListener('keyup', function (event) {
                if (event.key === 'Control' && !isDrawing) {
                    disableSelectionMode();
                }
            });

            window.addEventListener('blur', function () {
                if (!isDrawing) {
                    disableSelectionMode();
                }
            });

            document.addEventListener('contextmenu', function (event) {
                event.preventDefault();
                event.stopPropagation();
            }, true);

            map.events.add('mousedown', function (e) {
                const originalEvent = getOriginalEvent(e);
                if (!originalEvent || !originalEvent.ctrlKey) {
                    document.getElementById('map').classList.add('dragging');
                    return;
                }

                beginSelection(originalEvent);
            });

            const selectionLayer = document.getElementById('selectionLayer');
            selectionLayer.addEventListener('mousedown', beginSelection);
            selectionLayer.addEventListener('mousemove', updateSelection);
            document.addEventListener('mouseup', finishSelection);
        }

        function getOriginalEvent(e) {
            const domEvent = e.get('domEvent');
            return domEvent ? domEvent.originalEvent : null;
        }

        function getMapPixel(originalEvent) {
            const mapRect = map.container.getElement().getBoundingClientRect();
            return [
                originalEvent.clientX - mapRect.left,
                originalEvent.clientY - mapRect.top
            ];
        }

        function pixelToCoords(originalEvent) {
            const projection = map.options.get('projection');
            const globalPixels = map.converter.pageToGlobal([originalEvent.pageX, originalEvent.pageY]);
            return projection.fromGlobalPixels(globalPixels, map.getZoom());
        }

        function coordsToMapPixel(coords) {
            const projection = map.options.get('projection');
            const globalPixels = projection.toGlobalPixels(coords, map.getZoom());
            const pagePixel = map.converter.globalToPage(globalPixels);
            const mapRect = map.container.getElement().getBoundingClientRect();
            const mapPageLeft = mapRect.left + window.pageXOffset;
            const mapPageTop = mapRect.top + window.pageYOffset;

            return [
                pagePixel[0] - mapPageLeft,
                pagePixel[1] - mapPageTop
            ];
        }

        function parseCoordsString(coordsString) {
            const values = coordsString.split(',').map(function (value) {
                return Number(value.trim());
            });

            if (values.length < 4 || values.some(Number.isNaN)) {
                return null;
            }

            return {
                north: values[0],
                west: values[1],
                south: values[2],
                east: values[3]
            };
        }

        function enableSelectionMode() {
            const mapElement = document.getElementById('map');
            const selectionLayer = document.getElementById('selectionLayer');

            mapElement.classList.add('ctrl-select');
            mapElement.classList.remove('dragging');
            selectionLayer.classList.add('active');
            map.behaviors.disable('drag');
        }

        function disableSelectionMode() {
            const mapElement = document.getElementById('map');
            const selectionLayer = document.getElementById('selectionLayer');

            mapElement.classList.remove('ctrl-select', 'dragging');
            selectionLayer.classList.remove('active');
            map.behaviors.enable('drag');
        }

        function normalizeGeoBounds(firstCoords, secondCoords) {
            const south = Math.min(firstCoords[0], secondCoords[0]);
            const north = Math.max(firstCoords[0], secondCoords[0]);
            const west = Math.min(firstCoords[1], secondCoords[1]);
            const east = Math.max(firstCoords[1], secondCoords[1]);

            return {
                rectangle: [[south, west], [north, east]],
                coordsString: [north, west, south, east].join(',')
            };
        }

        function normalizePixelBounds(firstPixel, secondPixel) {
            const left = Math.min(firstPixel[0], secondPixel[0]);
            const top = Math.min(firstPixel[1], secondPixel[1]);
            const right = Math.max(firstPixel[0], secondPixel[0]);
            const bottom = Math.max(firstPixel[1], secondPixel[1]);

            return {
                x: left,
                y: top,
                width: right - left,
                height: bottom - top
            };
        }

        function captureBoundsToPixelRect(bounds) {
            const topLeft = coordsToMapPixel([bounds.north, bounds.west]);
            const bottomRight = coordsToMapPixel([bounds.south, bounds.east]);
            const pixelBounds = normalizePixelBounds(topLeft, bottomRight);

            return [
                Math.round(pixelBounds.x),
                Math.round(pixelBounds.y),
                Math.round(pixelBounds.width),
                Math.round(pixelBounds.height)
            ].join(',');
        }

        function prepareHighResolutionCapture(coordsString) {
            const bounds = parseCoordsString(coordsString);
            if (!bounds) {
                return false;
            }

            highResolutionCaptureState = {
                center: map.getCenter(),
                zoom: map.getZoom(),
                bounds: bounds
            };

            hideSelectionBox();
            disableSelectionMode();
            document.body.classList.add('capture-mode');

            map.setBounds(
                [[bounds.south, bounds.west], [bounds.north, bounds.east]],
                {
                    checkZoomRange: true,
                    duration: 0,
                    zoomMargin: 0
                }
            );

            return true;
        }

        function getHighResolutionCaptureRect() {
            if (!highResolutionCaptureState) {
                return '';
            }

            return captureBoundsToPixelRect(highResolutionCaptureState.bounds);
        }

        function restoreMapAfterHighResolutionCapture() {
            if (!highResolutionCaptureState) {
                return;
            }

            const state = highResolutionCaptureState;
            highResolutionCaptureState = null;

            document.body.classList.remove('capture-mode');
            map.setCenter(state.center, state.zoom, {
                duration: 0
            });
        }

        function setSelectionBox(firstPixel, secondPixel) {
            const selectionBox = document.getElementById('selectionBox');
            const pixelBounds = normalizePixelBounds(firstPixel, secondPixel);

            selectionBox.style.display = 'block';
            selectionBox.style.left = `${pixelBounds.x}px`;
            selectionBox.style.top = `${pixelBounds.y}px`;
            selectionBox.style.width = `${pixelBounds.width}px`;
            selectionBox.style.height = `${pixelBounds.height}px`;
        }

        function hideSelectionBox() {
            const selectionBox = document.getElementById('selectionBox');
            selectionBox.style.display = 'none';
        }

        function beginSelection(originalEvent) {
            originalEvent.preventDefault();
            originalEvent.stopPropagation();

            isDrawing = true;
            startCoords = pixelToCoords(originalEvent);
            lastCoords = startCoords;
            startPixel = getMapPixel(originalEvent);
            lastPixel = startPixel;

            enableSelectionMode();
            setSelectionBox(startPixel, lastPixel);
        }

        function updateSelection(originalEvent) {
            if (!isDrawing) return;

            originalEvent.preventDefault();
            originalEvent.stopPropagation();

            lastCoords = pixelToCoords(originalEvent);
            lastPixel = getMapPixel(originalEvent);
            setSelectionBox(startPixel, lastPixel);
        }

        function finishSelection() {
            document.getElementById('map').classList.remove('dragging');

            if (!isDrawing) return;

            isDrawing = false;
            disableSelectionMode();

            if (!startCoords || !lastCoords || !startPixel || !lastPixel) {
                hideSelectionBox();
                return;
            }

            const pixelBounds = normalizePixelBounds(startPixel, lastPixel);
            if (pixelBounds.width < 5 || pixelBounds.height < 5) {
                hideSelectionBox();
                return;
            }

            const geoBounds = normalizeGeoBounds(startCoords, lastCoords);
            hideSelectionBox();

            if (!mapWidget) {
                console.error("Map widget bridge is not ready.");
                return;
            }

            mapWidget.onAreaSelected(
                geoBounds.coordsString,
                pixelBounds.x,
                pixelBounds.y,
                pixelBounds.width,
                pixelBounds.height
            );
        }
    </script>
</body>
</html>
